apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tabix.fullname" . }}
  labels:
    {{- include "tabix.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "tabix.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tabix.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: tabix
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
