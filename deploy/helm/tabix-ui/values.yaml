# Default values for tabix-ui.
replicaCount: 1

image:
  repository: spoonest/clickhouse-tabix-web-client
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 80

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 32Mi

# For production use, you would likely enable an Ingress
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: tabix.local
      paths:
        - path: /
          pathType: ImplementationSpecific
