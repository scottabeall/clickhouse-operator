apiVersion: "clickhouse.altinity.com/v1"
kind: "ClickHouseInstallation"
metadata:
  name: test-035-1-auto-recovery-disabled
spec:
  configuration:
    clusters:
      - name: default
        layout:
          shardsCount: 1
          replicasCount: 1
  templates:
    podTemplates:
      - name: slow-start
        spec:
          containers:
            - name: clickhouse-pod
              image: altinity/clickhouse-server:25.8.16.10001.altinitystable
              command:
                - "/bin/bash"
                - "-c"
                - "sleep 90 && /entrypoint.sh"
              livenessProbe:
                exec:
                  command:
                    - bash
                    - -xc
                    - 'echo 1'
                initialDelaySeconds: 90
                timeoutSeconds: 10
  defaults:
    templates:
      podTemplate: slow-start
