apiVersion: "clickhouse.altinity.com/v1"
kind: "ClickHouseInstallation"
metadata:
  name: test-062-hooks
spec:
  defaults:
    templates:
      podTemplate: default
  useTemplates:
    - name: clickhouse-version
  configuration:
    clusters:
      - name: default
        reconcile:
          hooks:
            pre:
              - sql:
                  queries:
                    - "SELECT 'allhosts_hook_marker'"
                target: AllHosts
                events:
                  - ClusterReconcile
        layout:
          shardsCount: 2
          replicasCount: 1
